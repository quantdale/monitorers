# Rust CI for sys-monitor-tauri (Tauri app with Windows-only backend)
# Runs build, test, fmt check, and clippy from src-tauri.

name: Rust

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: sys-monitor-tauri/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sys-monitor-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sys-monitor-tauri/src-tauri/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --verbose -- -D warnings

  frontend:
    name: Frontend — typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sys-monitor-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sys-monitor-tauri/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npm test -- --run
